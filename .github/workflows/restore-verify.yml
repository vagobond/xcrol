name: Weekly Restore Verification

# Pulls the most recent Xcrol backup from Backblaze B2, validates the manifest,
# loads every table dump into a throwaway Postgres instance, and asserts that
# row counts match the manifest. Fails loudly if anything is off.
#
# Required repo secrets:
#   B2_KEY_ID, B2_APPLICATION_KEY, B2_BUCKET_NAME
# Optional:
#   ALERT_WEBHOOK   — Discord/Slack webhook for a one-line failure notice

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: verify
          POSTGRES_DB: verify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install b2 psycopg2-binary

      - name: Authenticate to Backblaze B2
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: b2 account authorize "$B2_KEY_ID" "$B2_APPLICATION_KEY"

      - name: Download latest snapshot
        env:
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          mkdir -p snapshot
          # Find latest folder under xcrol/ (sorted lexically = chronologically).
          LATEST=$(b2 ls --recursive "b2://$B2_BUCKET_NAME/xcrol/" \
                   | awk '{print $NF}' \
                   | grep '/manifest.json.gz$' \
                   | sort | tail -n 1)
          if [ -z "$LATEST" ]; then
            echo "::error::No manifest.json.gz found in bucket"
            exit 1
          fi
          PREFIX=$(dirname "$LATEST")
          echo "Latest snapshot prefix: $PREFIX"
          echo "SNAPSHOT_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          b2 sync "b2://$B2_BUCKET_NAME/$PREFIX" ./snapshot

      - name: Verify manifest and row counts
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: verify
          PGDATABASE: verify
        run: python scripts/verify_restore.py ./snapshot

      - name: Notify on failure
        if: failure() && env.ALERT_WEBHOOK != ''
        env:
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
          PREFIX: ${{ env.SNAPSHOT_PREFIX }}
        run: |
          curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"content\":\"Xcrol restore-verify FAILED for snapshot ${PREFIX:-unknown} — see GitHub Actions run ${{ github.run_id }}\"}" \
            "$ALERT_WEBHOOK" || true
